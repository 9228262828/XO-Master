name: calcpro
description: "CalcPro - Smart Calculator with secure local authentication."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  crypto: ^3.0.3
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_native_splash:
  color: "#1A1A2E"
  image: assets/icon/app_icon.png
  color_dark: "#1A1A2E"
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#1A1A2E"
    image: assets/icon/app_icon.png
    icon_background_color: "#1A1A2E"
  web: false

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1A1A2E"
    theme_color: "#6C63FF"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
