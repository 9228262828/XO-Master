<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendWise – Smart Expense Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc; color: #1e293b; text-align: center;
    }
    .hero {
      background: linear-gradient(135deg, #4ade80, #16a34a);
      color: white; padding: 80px 24px;
    }
    .logo {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 42px; margin-bottom: 20px;
    }
    .hero h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .hero p  { font-size: 1.1rem; opacity: 0.9; max-width: 480px; margin: 0 auto; }

    .links {
      max-width: 480px; margin: 40px auto;
      padding: 0 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .link-card {
      display: flex; align-items: center; gap: 14px;
      background: white; border: 1px solid #e2e8f0;
      border-radius: 16px; padding: 16px 20px;
      text-decoration: none; color: inherit;
      transition: box-shadow 0.15s;
    }
    .link-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .link-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .link-card .text strong { display: block; font-weight: 600; }
    .link-card .text small  { color: #64748b; font-size: 0.82rem; }
    .link-card .arrow { margin-left: auto; color: #94a3b8; }

    footer { padding: 32px; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">💚</div>
    <h1>SpendWise</h1>
    <p>Smart Expense Tracker — track, analyze, and manage your spending with ease.</p>
  </div>

  <div class="links">
    <a class="link-card" href="privacy/">
      <div class="link-icon" style="background:#f0fdf4">🛡️</div>
      <div class="text">
        <strong>Privacy Policy</strong>
        <small>How we handle your data</small>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="link-card" href="terms/">
      <div class="link-icon" style="background:#eef2ff">⚖️</div>
      <div class="text">
        <strong>Terms &amp; Conditions</strong>
        <small>License and usage terms</small>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <footer>© 2025 SpendWise. All rights reserved.</footer>
</body>
</html>
